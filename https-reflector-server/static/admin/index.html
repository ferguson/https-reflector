<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTTPS Reflector Status</title>
  <style>
    :root {
      --bg:       #3A5366;
      --bg-dark:  #2E4555;
      --cyan:     #41B9C3;
      --cyan-lt:  #96EEF2;
      --navy:     #0E2446;
      --gray:     #7a9ab0;
      --gray-lt:  #CCCCCC;
      --orange:   #FF621D;
      --white:    #F9F9F9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--white);
      font-size: 14px;
      line-height: 20px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--bg-dark);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--cyan);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; flex-direction: column; gap: 3px; }
    .header h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.3px;
    }
    #server-info {
      font-size: 12px;
      color: var(--gray);
      min-height: 16px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ws-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gray);
    }
    .ws-dot.live { background: var(--cyan); }
    #header-ts {
      font-size: 12px;
      color: var(--gray-lt);
    }

    /* ── Auth overlay ── */
    #auth {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 14px;
    }
    #auth h2 { color: var(--cyan-lt); font-size: 18px; font-weight: 600; }
    #auth-error { color: var(--orange); font-size: 14px; display: none; }
    #pw-input {
      background: var(--bg-dark);
      border: 1px solid var(--cyan);
      color: var(--white);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      width: 240px;
    }
    #pw-input:focus { border-color: var(--cyan-lt); }
    #pw-submit {
      background: var(--cyan);
      color: var(--navy);
      border: none;
      padding: 8px 22px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    #pw-submit:hover { background: var(--cyan-lt); }

    /* ── Dashboard ── */
    #dashboard { display: none; padding: 16px 20px; }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead th {
      background: var(--bg-dark);
      color: var(--gray);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(65,185,195,0.3);
      position: sticky;
      top: 66px;
      z-index: 5;
    }
    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    tbody tr:hover { background: rgba(65,185,195,0.05); }

    tbody td {
      padding: 8px 12px;
      vertical-align: middle;
    }
    tbody td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--gray-lt);
    }

    tr.live td:first-child {
      border-left: 3px solid var(--cyan);
      padding-left: 9px;
    }
    tr.stale td:first-child {
      border-left: 3px solid transparent;
      padding-left: 9px;
    }

    .dev-name { font-weight: 600; color: var(--white); }
    tr.stale .dev-name { color: var(--gray); }
    tr.stale .since    { color: var(--gray); }
    tr.stale td.num    { color: var(--gray); }

    .status-live { color: var(--cyan); font-weight: 700; font-size: 12px; }
    .status-off  { color: var(--gray); font-size: 12px; }

    .since { color: var(--gray-lt); }

    .restart-badge {
      font-size: 10px;
      background: rgba(65,185,195,0.2);
      color: var(--cyan);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    tr.section-sep td {
      padding: 14px 12px 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--gray);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: var(--bg);
    }

    tr.waiting td:first-child {
      border-left: 3px solid var(--orange);
      padding-left: 9px;
    }
    tr.failed td:first-child {
      border-left: 3px solid transparent;
      padding-left: 9px;
    }
    tr.failed .dev-name { color: var(--gray); }
    tr.failed td        { color: var(--gray); }

    .status-wait { color: var(--orange); font-size: 12px; }
    .status-fail { color: var(--gray);   font-size: 12px; }
    .new-badge {
      font-size: 10px;
      background: rgba(255, 98, 29, 0.18);
      color: var(--orange);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    #empty-msg {
      color: var(--gray);
      font-style: italic;
      padding: 20px 0;
      display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>HTTPS Reflector</h1>
    <div id="server-info"></div>
  </div>
  <div class="header-right">
    <span class="ws-dot" id="ws-dot"></span>
    <span id="header-ts">connecting…</span>
  </div>
</div>

<div id="auth">
  <h2>Status Dashboard</h2>
  <div id="auth-error">Incorrect password</div>
  <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" />
  <button id="pw-submit">Connect</button>
</div>

<div id="dashboard">
  <table id="tbl">
    <thead>
      <tr>
        <th>Device</th>
        <th>Status</th>
        <th>Since</th>
        <th class="num">Connections</th>
        <th class="num">Requests</th>
        <th class="num">In</th>
        <th class="num">Out</th>
      </tr>
    </thead>
    <tbody id="tbl-body"></tbody>
  </table>
  <div id="empty-msg">No devices seen yet</div>
</div>

<script>
(function () {
  var ws = null;

  var authDiv    = document.getElementById('auth');
  var dashboard  = document.getElementById('dashboard');
  var authError  = document.getElementById('auth-error');
  var pwInput    = document.getElementById('pw-input');
  var pwSubmit   = document.getElementById('pw-submit');
  var headerTs   = document.getElementById('header-ts');
  var serverInfo = document.getElementById('server-info');
  var wsDot      = document.getElementById('ws-dot');

  function setConnected(on) {
    wsDot.className = 'ws-dot' + (on ? ' live' : '');
  }

  var savedPassword = null;
  var reconnectTimer = null;
  var reconnectDelay = 1000;
  var lastSnapshot = null;

  setInterval(function () {
    if (lastSnapshot) render(lastSnapshot);
  }, 1000);

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function () {
      reconnectTimer = null;
      connect(savedPassword);
    }, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  }

  function connect(password) {
    savedPassword = password;
    if (ws) { try { ws.close(); } catch(e) {} }
    var proto = location.protocol === 'https:' ? 'wss://' : 'ws://';
    ws = new WebSocket(proto + location.host + '/https-reflector/status.ws');

    ws.onopen = function () {
      reconnectDelay = 1000;
      setConnected(true);
      if (password != null) ws.send(password);
    };

    ws.onmessage = function (evt) {
      var data;
      try { data = JSON.parse(evt.data); } catch(e) { return; }
      lastSnapshot = data;
      authDiv.style.display   = 'none';
      dashboard.style.display = 'block';
      render(data);
    };

    ws.onclose = function (evt) {
      setConnected(false);
      if (evt.code === 4401) {
        // auth failure — don't reconnect, show password prompt
        savedPassword = null;
        authDiv.style.display   = '';
        dashboard.style.display = 'none';
        authError.style.display = '';
        pwInput.value = '';
        pwInput.focus();
      } else {
        if (dashboard.style.display === 'block') {
          headerTs.textContent = 'Reconnecting…';
        }
        scheduleReconnect();
      }
    };
  }

  pwSubmit.onclick = function () {
    authError.style.display = 'none';
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    reconnectDelay = 1000;
    connect(pwInput.value);
  };
  pwInput.onkeydown = function (e) {
    if (e.key === 'Enter') pwSubmit.onclick();
  };

  // ── Formatting helpers ──

  function fmtBytes(n) {
    if (n >= 1073741824) return (n / 1073741824).toFixed(1) + ' GB';
    if (n >= 1048576)    return (n / 1048576).toFixed(1) + ' MB';
    if (n >= 1024)       return (n / 1024).toFixed(1) + ' KB';
    return n + ' B';
  }

  function fmtDur(ms) {
    var s = Math.floor(ms / 1000);
    var m = Math.floor(s / 60); s = s % 60;
    var h = Math.floor(m / 60); m = m % 60;
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + s + 's';
    return s + 's';
  }

  function fmtAgo(ts) { return fmtDur(Date.now() - ts) + ' ago'; }

  function fmtTime(ts) {
    var d = new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
         + ' ' + d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var RESTART_TOLERANCE_MS = 60 * 1000;

  function makeRow(name, rec, serverStartAt) {
    var tr = document.createElement('tr');
    var statusHtml, sinceHtml;

    if (rec.connected) {
      tr.className = 'live';
      var dur = rec.sessionStartAt ? fmtDur(Date.now() - rec.sessionStartAt) : '—';
      statusHtml = '<span class="status-live">● LIVE &nbsp;' + esc(dur) + '</span>';
      if (rec.sessionStartAt) {
        sinceHtml = '<span class="since">' + esc(fmtTime(rec.sessionStartAt)) + '</span>';
        if (serverStartAt && Math.abs(rec.sessionStartAt - serverStartAt) < RESTART_TOLERANCE_MS) {
          sinceHtml += '<span class="restart-badge">&#x21BB; restart</span>';
        }
      } else {
        sinceHtml = '<span class="since">—</span>';
      }
    } else {
      tr.className = 'stale';
      var lastSeen = rec.lastDisconnectedAt ? fmtAgo(rec.lastDisconnectedAt) : 'never';
      statusHtml = '<span class="status-off">○ ' + esc(lastSeen) + '</span>';
      sinceHtml  = rec.lastConnectedAt
        ? '<span class="since">' + esc(fmtTime(rec.lastConnectedAt)) + '</span>'
        : '<span class="since">—</span>';
    }

    tr.innerHTML =
      '<td><span class="dev-name">' + esc(name) + '</span></td>' +
      '<td>' + statusHtml + '</td>' +
      '<td>' + sinceHtml + '</td>' +
      '<td class="num">' + rec.connectionCount.toLocaleString() + '</td>' +
      '<td class="num">' + rec.requestCount.toLocaleString() + '</td>' +
      '<td class="num">' + esc(fmtBytes(rec.bytesIn)) + '</td>' +
      '<td class="num">' + esc(fmtBytes(rec.bytesOut)) + '</td>';

    return tr;
  }

  function makeSepRow(label) {
    var tr = document.createElement('tr');
    tr.className = 'section-sep';
    tr.innerHTML = '<td colspan="7">' + esc(label) + '</td>';
    return tr;
  }

  function makeFailedRow(name, rec) {
    var tr = document.createElement('tr');
    tr.className = 'failed';
    var sessions = rec.count === 1 ? '1 session' : rec.count + ' sessions';
    tr.innerHTML =
      '<td><span class="dev-name">' + esc(name) + '</span></td>' +
      '<td><span class="status-fail">✗ gave up (' + esc(sessions) + ')</span></td>' +
      '<td><span class="since">' + esc(fmtAgo(rec.lastAt)) + '</span></td>' +
      '<td class="num">—</td>' +
      '<td class="num">—</td>' +
      '<td class="num">—</td>' +
      '<td class="num">—</td>';
    return tr;
  }

  function makeWaitRow(name, count, isNew) {
    var tr = document.createElement('tr');
    tr.className = 'waiting';
    var countStr = count === 1 ? '1 waiting' : count + ' waiting';
    var nameCellHtml = '<span class="dev-name">' + esc(name) + '</span>'
      + (isNew ? '<span class="new-badge">never seen</span>' : '');
    tr.innerHTML =
      '<td>' + nameCellHtml + '</td>' +
      '<td><span class="status-wait">◌ ' + esc(countStr) + '</span></td>' +
      '<td><span class="since">—</span></td>' +
      '<td class="num">—</td>' +
      '<td class="num">—</td>' +
      '<td class="num">—</td>' +
      '<td class="num">—</td>';
    return tr;
  }

  function render(snapshot) {
    headerTs.textContent = 'Updated ' + new Date(snapshot.ts).toLocaleTimeString();

    if (snapshot.serverStartAt) {
      serverInfo.textContent = 'Server started ' + fmtAgo(snapshot.serverStartAt);
    }

    var cutoff = new Date(); cutoff.setHours(0,0,0,0);
    var cut = cutoff.getTime();

    var names = Object.keys(snapshot.devices).sort();
    var active = [], old = [];
    for (var i = 0; i < names.length; i++) {
      var rec = snapshot.devices[names[i]];
      if (rec.connected || (rec.lastConnectedAt && rec.lastConnectedAt >= cut)) {
        active.push(names[i]);
      } else {
        old.push(names[i]);
      }
    }

    var tbody   = document.getElementById('tbl-body');
    var emptyMsg = document.getElementById('empty-msg');
    tbody.innerHTML = '';

    var serverStartAt = snapshot.serverStartAt || null;

    var waitingNames = Object.keys(snapshot.waiting || {}).sort();

    if (active.length === 0 && waitingNames.length === 0 && old.length === 0) {
      emptyMsg.style.display = '';
    } else {
      emptyMsg.style.display = 'none';

      for (var j = 0; j < active.length; j++) {
        tbody.appendChild(makeRow(active[j], snapshot.devices[active[j]], serverStartAt));
      }

      if (waitingNames.length > 0) {
        tbody.appendChild(makeSepRow('Waiting to Come Online'));
        for (var w = 0; w < waitingNames.length; w++) {
          var wName = waitingNames[w];
          var wCount = snapshot.waiting[wName];
          var isNew = !snapshot.devices || !snapshot.devices[wName];
          tbody.appendChild(makeWaitRow(wName, wCount, isNew));
        }
      }

      if (old.length > 0) {
        tbody.appendChild(makeSepRow('Previously Connected'));
        for (var k = 0; k < old.length; k++) {
          tbody.appendChild(makeRow(old[k], snapshot.devices[old[k]], serverStartAt));
        }
      }

      var failedAttempts = snapshot.failedAttempts || {};
      var failedNames = Object.keys(failedAttempts).sort();
      if (failedNames.length > 0) {
        tbody.appendChild(makeSepRow('Unrecognized — Never Connected'));
        for (var f = 0; f < failedNames.length; f++) {
          tbody.appendChild(makeFailedRow(failedNames[f], failedAttempts[failedNames[f]]));
        }
      }
    }
  }

  // initial connection — no password sent; server responds immediately if no auth required
  connect(null);
})();
</script>
</body>
</html>
